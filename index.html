<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="left" id="left-image">
        <img src="assests/background-image.avif">
        <div>
            <img src="assests/odin-lined.png" alt="Odin Logo" width="75" height="100">
            <h1 class="logo">ODIN</h1>
        </div>
        <p>Photo by <a href="">Halie West</a> on <a href="">Unsplash</a></p>
    </div>
    <div class="right">
        <div>
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
            <p>Sign up <em>now</em> to get started.</p>
            <p>You know you want to.</p>
        </div>
        <form action="https://httpbin.org/post" method="post" id="my-form">
            <legend>Let's do this!</legend>
            <div>
                <div>
                    <label for="">FIRST NAME</label>
                    <input>
                    <label for="">EMAIL</label>
                    <input>
                
                    <label for="">PASSWORD</label>
                    <input>
                </div>
                <div>
                    <label for="">LAST NAME</label>
                    <input>
                    <label for="">PHONE NUMBER</label>
                    <input>
                    <label for="">CONFIRM PASSWORD</label>
                    <input>
                </div>
            </div>
            <button type="submit" class="hidden" id="submit-button"></button>
        </form>
        <div>
            <label class="submit-label" for="submit-button">Create Account</label>
            <!-- clicking the label clicks the submit button -->
            <div>
                <p>Already have an account? </p>
                <p><a href=""> Log in</a></p>
            </div>
        </div>
    </div>
    <!-- commit set up basic html layout -->
</body>
</html>
